<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "/static/css/style.css">
        <title>insta485</title>
    </head>

    <body>
        <header>
            <div class = "header">
                <a href = "/">
                    <img src="/static/images/instagram_logo.jpg" alt="Instagram logo" width = "100" height = "100">
                </a>

                <img src = "/static/images/insta485_logo.png" alt = "Insta485 logo" width = "250" height = "100">

                <div class = "empty_header"></div>

                <div class = "header_text">
                    <a href="/explore/">explore</a> | <a href="/users/{{logname}}/">{{logname}}</a>
                </div>

            </div>
        </header>

        <main>
            <h2> Edit </h2>
            <p></p>
            <img class = "pfp" src = "{{ filename }}" alt = "user.pfp">
            <a>{{ logname }}</a>
            <form action="/accounts/?target={{ request.path }}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <a>Photo</a>
                <input type="file" name="file" accept="image/*"/>
                <p></p>
                <a>Name</a>
                <input type="text" name="fullname" value="{{ fullname }}" required/>
                <p></p>
                <a>Email</a>
                <input type="text" name="email" value="{{ email }}" required/>
                <p></p>
                <input type="submit" name="update" value="submit"/>
                <input type="hidden" name="operation" value="edit_account"/>
            </form>


            <a href="/accounts/password/">Change password</a>
            <a href="/accounts/delete/">Delete account</a>


        </main>
    </body>
</html>
