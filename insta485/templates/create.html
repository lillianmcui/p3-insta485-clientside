<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "/static/css/style.css">
        <title>insta485</title>
    </head>

    <body>
        <header>
            <div class = "header">
                <a href = "/">
                    <img src="/static/images/instagram_logo.jpg" alt="Instagram logo" width = "100" height = "100">
                </a>

                <img src = "/static/images/insta485_logo.png" alt = "Insta485 logo" width = "250" height = "100">

                <div class = "empty_header"></div>

                <div class = "header_text">
                    <a href="/accounts/login/">login</a>
                </div>
            </div>
        </header>

        <main>
            <h2> Create </h2>
            <form action="/accounts?target=/accounts/login" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <a>Photo</a>
                <input type="file" name="file" required/>
                <p></p>
                <a>Name</a>
                <input type="text" name="fullname" required/>
                <p></p>
                <a>Username</a>
                <input type="text" name="username" required/>
                <p></p>
                <a>Email</a>
                <input type="text" name="email" required/>
                <p></p>
                <a>Password</a>
                <input type="password" name="password" required/>
                <p></p>
                <input type="submit" name="signup" value="sign up"/>
                <input type="hidden" name="operation" value="create"/>
            </form>

            <a href="/accounts/login/">Have an account? login here</a>

        </main>
    </body>
</html>
