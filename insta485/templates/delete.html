<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "/static/css/style.css">
        <title>insta485</title>
    </head>

    <body>
        <header>
            <div class = "header">
                <a href = "/">
                    <img src="/static/images/instagram_logo.jpg" alt="Instagram logo" width = "100" height = "100">
                </a>

                <img src = "/static/images/insta485_logo.png" alt = "Insta485 logo" width = "250" height = "100">

                <div class = "empty_header"></div>

                <div class = "header_text">
                    <a href="/explore/">explore</a> | <a href="/users/{{logname}}/">{{logname}}</a>
                </div>



            </div>
        </header>

        <main>
            <h2> {{ logname }} </h2>
            <form action="/accounts/?target=/accounts/create" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="submit" name="delete" value="confirm delete account"/>
                <input type="hidden" name="operation" value="delete"/>
            </form>


        </main>
    </body>
</html>
