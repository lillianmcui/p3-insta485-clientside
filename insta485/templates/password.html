<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "/static/css/style.css">
        <title>insta485</title>
    </head>

    <body>
        <header>
            <div class = "header">
                <a href = "/">
                    <img src="/static/images/instagram_logo.jpg" alt="Instagram logo" width = "100" height = "100">
                </a>

                <img src = "/static/images/insta485_logo.png" alt = "Insta485 logo" width = "250" height = "100">

                <div class = "empty_header"></div>

                <div class = "header_text">
                    <a href="/explore/">explore</a> | <a href="/users/{{logname}}/">{{logname}}</a>
                </div>

            </div>
        </header>

        <main>
        <form action="/accounts/?target=/accounts/edit/" method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <a>Old password</a>
            <input type="password" name="password" required/>
            <p></p>
            <a>New password</a>
            <input type="password" name="new_password1" required/>
            <p></p>
            <a>New password again</a>
            <input type="password" name="new_password2" required/>
            <input type="submit" name="update_password" value="submit"/>
            <input type="hidden" name="operation" value="update_password"/>
        </form>
        <a href="/accounts/edit/">Back to edit account</a>



        </main>
    </body>
</html>
