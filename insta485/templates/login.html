<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href = "/static/css/style.css">
        <title>insta485</title>
    </head>

    <body>
        <header>
            <div class = "header">
                <a href = "/">
                    <img src="/static/images/instagram_logo.jpg" alt="Instagram logo" width = "100" height = "100">
                </a>

                <img src = "/static/images/insta485_logo.png" alt = "Insta485 logo" width = "250" height = "100">

                <div class = "empty_header"></div>
            </div>
        </header>

        <main>
            <h2> Login </h2>
            <form action="/accounts/?target=/" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="text" name="username" required placeholder="username"/>
                <input type="password" name="password" required placeholder="password"/>
                <input type="submit" value="login"/>
                <input type="hidden" name="operation" value="login"/>
            </form>

            <a href="/accounts/create/">Don't have an account? sign up here</a>



        </main>
    </body>
</html>
